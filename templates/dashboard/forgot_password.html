{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — Hera</title>
    <link rel="icon" href="{% static 'img/heralogo.png' %}" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/hera.css' %}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .forgot-card {
            background: var(--hera-white);
            border-radius: var(--hera-radius-xl);
            box-shadow: var(--hera-shadow-lg);
            border: 1px solid var(--hera-gray-200);
            width: 100%;
            max-width: 420px;
            padding: 40px 36px 36px;
            text-align: center;
        }
        .forgot-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 20px;
            background: var(--hera-yellow-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--hera-yellow);
        }
        .forgot-icon svg {
            width: 28px;
            height: 28px;
        }
        .forgot-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--hera-gray-900);
            margin-bottom: 8px;
        }
        .forgot-subtitle {
            font-size: 13.5px;
            color: var(--hera-gray-500);
            margin-bottom: 28px;
            line-height: 1.5;
        }
        .forgot-form .form-group {
            margin-bottom: 18px;
            text-align: left;
        }
        .forgot-form label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--hera-gray-700);
            margin-bottom: 6px;
        }
        .forgot-form .btn-primary {
            width: 100%;
            padding: 12px;
            font-size: 14px;
        }
        .forgot-error {
            background: #fef2f2;
            color: var(--hera-red);
            font-size: 13px;
            font-weight: 500;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #fecaca;
            margin-bottom: 18px;
        }
        .forgot-success {
            background: #f0fdf4;
            color: #166534;
            font-size: 13px;
            font-weight: 500;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #bbf7d0;
            margin-bottom: 18px;
        }
        .forgot-links {
            margin-top: 20px;
            font-size: 13px;
            color: var(--hera-gray-400);
        }
        .forgot-links a {
            color: var(--hera-accent);
            text-decoration: none;
            font-weight: 500;
        }
        .forgot-links a:hover {
            text-decoration: underline;
        }
        .phone-input-group {
            display: flex;
            gap: 8px;
        }
        .phone-input-group select {
            width: 110px;
            flex-shrink: 0;
        }
        .phone-input-group input {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="forgot-card">
        <div class="forgot-icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
        </div>
        <div class="forgot-title">Forgot Password?</div>
        <div class="forgot-subtitle">
            Enter the phone number associated with your account<br>
            and we'll send you a code to reset your password.
        </div>

        {% if error %}
        <div class="forgot-error">{{ error }}</div>
        {% endif %}
        {% if success %}
        <div class="forgot-success">{{ success }}</div>
        {% endif %}

        <form method="post" class="forgot-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="phone_number">Phone Number</label>
                <div class="phone-input-group">
                    <select id="country_code" name="country_code" required>
                        <option value="+1" selected>🇺🇸 +1</option>
                        <option value="+44">🇬🇧 +44</option>
                        <option value="+91">🇮🇳 +91</option>
                        <option value="+61">🇦🇺 +61</option>
                        <option value="+49">🇩🇪 +49</option>
                        <option value="+33">🇫🇷 +33</option>
                        <option value="+81">🇯🇵 +81</option>
                        <option value="+86">🇨🇳 +86</option>
                        <option value="+52">🇲🇽 +52</option>
                        <option value="+55">🇧🇷 +55</option>
                    </select>
                    <input type="tel" id="phone_number" name="phone_number" placeholder="5551234567" required autofocus>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Send Reset Code</button>
        </form>
        <div class="forgot-links">
            <a href="{% url 'login' %}">Back to Sign In</a>
        </div>
    </div>
</body>
</html>
