{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Hera</title>
    <link rel="icon" href="{% static 'img/heralogo.png' %}" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/hera.css' %}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .reset-card {
            background: var(--hera-white);
            border-radius: var(--hera-radius-xl);
            box-shadow: var(--hera-shadow-lg);
            border: 1px solid var(--hera-gray-200);
            width: 100%;
            max-width: 420px;
            padding: 40px 36px 36px;
            text-align: center;
        }
        .reset-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 20px;
            background: var(--hera-green-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--hera-green);
        }
        .reset-icon svg {
            width: 28px;
            height: 28px;
        }
        .reset-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--hera-gray-900);
            margin-bottom: 8px;
        }
        .reset-subtitle {
            font-size: 13.5px;
            color: var(--hera-gray-500);
            margin-bottom: 28px;
            line-height: 1.5;
        }
        .reset-subtitle strong {
            color: var(--hera-gray-700);
        }
        .reset-form .form-group {
            margin-bottom: 18px;
            text-align: left;
        }
        .reset-form label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--hera-gray-700);
            margin-bottom: 6px;
        }
        .reset-form .otp-input {
            text-align: center;
            font-size: 20px;
            letter-spacing: 6px;
            font-weight: 700;
            padding: 14px;
        }
        .reset-form .btn-primary {
            width: 100%;
            padding: 12px;
            font-size: 14px;
        }
        .reset-error {
            background: #fef2f2;
            color: var(--hera-red);
            font-size: 13px;
            font-weight: 500;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #fecaca;
            margin-bottom: 18px;
        }
        .reset-links {
            margin-top: 20px;
            font-size: 13px;
            color: var(--hera-gray-400);
        }
        .reset-links a {
            color: var(--hera-accent);
            text-decoration: none;
            font-weight: 500;
        }
        .reset-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="reset-card">
        <div class="reset-icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
            </svg>
        </div>
        <div class="reset-title">Reset Password</div>
        <div class="reset-subtitle">
            Enter the 6-digit code sent to <strong>{{ phone }}</strong><br>
            along with your new password.
        </div>

        {% if error %}
        <div class="reset-error">{{ error }}</div>
        {% endif %}

        <form method="post" class="reset-form">
            {% csrf_token %}
            <div class="form-group" style="text-align:center;">
                <label style="text-align:left;">Verification Code</label>
                <input type="text" id="otp_code" name="otp_code" class="otp-input" placeholder="000000" maxlength="6" pattern="[0-9]{6}" required autofocus autocomplete="one-time-code">
            </div>
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" placeholder="Min. 8 characters" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter password" required>
            </div>
            <button type="submit" class="btn btn-primary">Reset Password</button>
        </form>
        <div class="reset-links">
            <a href="{% url 'login' %}">Back to Sign In</a>
        </div>
    </div>
</body>
</html>
